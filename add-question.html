<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Question | Smart X Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-indigo-50 min-h-screen p-6">
    
    <div class="max-w-2xl mx-auto space-y-8">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-black text-indigo-900 tracking-tight uppercase">Admin Question Engine</h1>
        <a href="/admin.html" class="text-sm font-bold text-indigo-600 hover:underline">Back to Admin</a>
      </div>

      <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-indigo-100 space-y-8">
        <div class="space-y-2">
          <h2 class="text-3xl font-extrabold text-slate-900">Add New SQL Question</h2>
          <p class="text-slate-500">Add questions directly to the D1 Database.</p>
        </div>

        <form id="questionForm" class="space-y-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Subject / Category</label>
            <input type="text" id="subject" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" placeholder="E.g., Physics, English, Math">
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">The Question</label>
            <textarea id="question" rows="3" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium" placeholder="Enter the question text here..."></textarea>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option A</label>
              <input type="text" id="optA" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Choice 1">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option B</label>
              <input type="text" id="optB" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Choice 2">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option C</label>
              <input type="text" id="optC" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Choice 3">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option D</label>
              <input type="text" id="optD" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Choice 4">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Correct Answer</label>
            <select id="correctAnswer" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
              <option value="A">Choice A</option>
              <option value="B">Choice B</option>
              <option value="C">Choice C</option>
              <option value="D">Choice D</option>
            </select>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all">Publish to Database</button>
        </form>

        <div id="successMsg" class="hidden p-6 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-center font-bold">
          Question added successfully!
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById('questionForm');
      const submitBtn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Publishing...';
        successMsg.classList.add('hidden');

        const optA = document.getElementById('optA').value;
        const optB = document.getElementById('optB').value;
        const optC = document.getElementById('optC').value;
        const optD = document.getElementById('optD').value;
        const correctKey = document.getElementById('correctAnswer').value;
        
        let answerText = '';
        if(correctKey === 'A') answerText = optA;
        if(correctKey === 'B') answerText = optB;
        if(correctKey === 'C') answerText = optC;
        if(correctKey === 'D') answerText = optD;

        const payload = {
          subject: document.getElementById('subject').value,
          question: document.getElementById('question').value,
          options: JSON.stringify([optA, optB, optC, optD]),
          answer: answerText
        };

        try {
          const response = await fetch('/api/questions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const res = await response.json();
          if (res.success) {
            successMsg.classList.remove('hidden');
            form.reset();
          } else {
            alert('Error: ' + res.error);
          }
        } catch (err) {
          alert('Sync Failed: Check your Cloudflare binding.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Publish to Database';
        }
      });
    </script>
  </body>
</html>
