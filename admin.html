<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart X Admin | Central Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    
    <!-- Admin Login Overlay -->
    <div id="adminLoginOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6 transition-all duration-300">
      <div class="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl">
        <div class="flex items-center justify-center gap-2 mb-8">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold italic">X</div>
          <span class="font-black text-2xl tracking-tight text-slate-900">ADMIN LOGIN</span>
        </div>
        <form id="adminLoginForm" class="space-y-4">
          <input type="email" id="adminEmail" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-600 font-medium" placeholder="Admin Email">
          <input type="password" id="adminPassword" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-600 font-medium" placeholder="Password">
          <p id="adminLoginError" class="text-red-500 text-xs font-bold hidden"></p>
          <button type="submit" id="adminLoginBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition-all">Sign In to Dashboard</button>
        </form>
      </div>
    </div>

    <div class="flex">
      <!-- Sidebar -->
      <aside class="w-64 bg-slate-900 min-h-screen p-6 text-white space-y-12 fixed h-full">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold italic">X</div>
          <span class="font-black text-xl tracking-tight">ADMIN HUB</span>
        </div>

        <nav class="space-y-2">
          <button onclick="switchTab('students')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition-colors flex items-center gap-3 font-bold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Students
          </button>
          <button onclick="switchTab('feedback')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition-colors flex items-center gap-3 font-bold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            General Feedback
          </button>
          <button onclick="switchTab('teacherFeedback')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition-colors flex items-center gap-3 font-bold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"></path></svg>
            Teacher Reviews
          </button>
          <button onclick="switchTab('addQuestion')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition-colors flex items-center gap-3 font-bold text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Add Quiz Question
          </button>
        </nav>

        <div class="pt-20">
          <a href="/" class="text-xs text-slate-500 font-bold hover:text-white uppercase tracking-widest">Logout & Back to Site</a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 ml-64 p-12 space-y-8">
        
        <header class="flex items-center justify-between">
          <div>
            <h1 id="pageTitle" class="text-4xl font-black text-slate-900 tracking-tight tracking-tight">Active Students</h1>
            <p class="text-slate-400 font-bold uppercase text-xs tracking-widest mt-2">D1 Real-time Synchronization</p>
          </div>
          <button onclick="refreshData()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-blue-100 hover:scale-105 active:scale-95 transition-all">Refresh Database</button>
        </header>

        <!-- Students Tab -->
        <section id="studentsView" class="tab-view bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
          <table class="w-full text-left">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-100">
                <th class="px-8 py-6 text-xs font-black text-slate-400 uppercase tracking-widest">Student Header</th>
                <th class="px-8 py-6 text-xs font-black text-slate-400 uppercase tracking-widest">Enrollment Details</th>
                <th class="px-8 py-6 text-xs font-black text-slate-400 uppercase tracking-widest">Phone</th>
                <th class="px-8 py-6 text-xs font-black text-slate-400 uppercase tracking-widest">Sync Time</th>
              </tr>
            </thead>
            <tbody id="studentList">
              <!-- JS Injected -->
            </tbody>
          </table>
        </section>

        <!-- Feedback Tab -->
        <section id="feedbackView" class="tab-view hidden grid gap-6">
          <!-- Feed cards injected here -->
        </section>

        <!-- Teacher Feedback Tab -->
        <section id="teacherFeedbackView" class="tab-view hidden grid gap-6">
          <!-- Teacher feedback cards injected here -->
        </section>

        <!-- Add Question Tab -->
        <section id="addQuestionView" class="tab-view hidden bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-8">
          <div class="space-y-2">
            <h2 class="text-3xl font-extrabold text-slate-900">Add New SQL Question</h2>
            <p class="text-slate-500">Add questions directly to the D1 Database.</p>
          </div>

          <form id="questionForm" class="space-y-6">
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Subject / Category</label>
              <input type="text" id="subject" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium" placeholder="E.g., Physics, English, Math">
            </div>

            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">The Question</label>
              <textarea id="question" rows="3" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all font-medium" placeholder="Enter the question text here..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option A</label>
                <input type="text" id="optA" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all" placeholder="Choice 1">
              </div>
              <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option B</label>
                <input type="text" id="optB" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all" placeholder="Choice 2">
              </div>
              <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option C</label>
                <input type="text" id="optC" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all" placeholder="Choice 3">
              </div>
              <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Option D</label>
                <input type="text" id="optD" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all" placeholder="Choice 4">
              </div>
            </div>

            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Correct Answer</label>
              <select id="correctAnswer" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-600 transition-all cursor-pointer text-slate-700">
                <option value="A">Choice A</option>
                <option value="B">Choice B</option>
                <option value="C">Choice C</option>
                <option value="D">Choice D</option>
              </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 hover:bg-slate-900 active:scale-[0.98] transition-all">Publish to Database</button>
          </form>

          <div id="successMsg" class="hidden p-6 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-center font-bold">
            Question added successfully!
          </div>
        </section>

        <div id="loading" class="hidden py-20 text-center">
          <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
          <p class="mt-4 text-slate-400 font-bold uppercase text-[10px] tracking-widest">Accessing D1 Cluster...</p>
        </div>

      </main>
    </div>

    <script>
      let currentTab = 'students';

      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
        document.getElementById(tab + 'View').classList.remove('hidden');
        document.getElementById('pageTitle').textContent = tab.charAt(0).toUpperCase() + tab.slice(1);
        refreshData();
      }

      async function refreshData() {
        const loading = document.getElementById('loading');
        loading.classList.remove('hidden');
        
        if (currentTab === 'students') {
          await fetchStudents();
        } else if (currentTab === 'feedback') {
          await fetchFeedback();
        } else if (currentTab === 'teacherFeedback') {
          await fetchTeacherFeedback();
        }
        
        loading.classList.add('hidden');
      }

      async function fetchTeacherFeedback() {
        const view = document.getElementById('teacherFeedbackView');
        view.innerHTML = '';
        try {
          const res = await fetch('/api/admin/teacher-comments');
          const data = await res.json();
          if (data.comments && data.comments.length > 0) {
            data.comments.forEach(f => {
              const card = document.createElement('div');
              card.className = 'bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-4';
              card.innerHTML = `
                <div class="flex justify-between items-start">
                  <div>
                    <h4 class="font-black text-lg text-slate-900">${f.student_name}</h4>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Teacher ID: ${f.teacher_id}</span>
                  </div>
                  <span class="text-[10px] mono text-slate-400 uppercase tracking-tighter">${f.created_at || 'Just Now'}</span>
                </div>
                <p class="text-slate-600 font-medium leading-relaxed italic border-l-4 border-slate-100 pl-6">"${f.comment}"</p>
              `;
              view.appendChild(card);
            });
          } else {
            view.innerHTML = '<div class="bg-white p-20 rounded-[2.5rem] text-center font-bold text-slate-400">No Teacher Reviews Yet.</div>';
          }
        } catch (e) { console.error(e); }
      }

      async function fetchStudents() {
        const list = document.getElementById('studentList');
        list.innerHTML = '';
        try {
          const res = await fetch('/api/admin/students');
          const data = await res.json();
          if (data.students && data.students.length > 0) {
            data.students.forEach(s => {
              const row = document.createElement('tr');
              row.className = 'border-b border-slate-50 hover:bg-blue-50/30 transition-all';
              row.innerHTML = `
                <td class="px-8 py-6">
                  <div class="font-black text-slate-900">${s.name}</div>
                  <div class="text-xs text-slate-400 lowercase">${s.email}</div>
                </td>
                <td class="px-8 py-6">
                  <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Grade ${s.grade}</span>
                </td>
                <td class="px-8 py-6 font-bold text-slate-600">+251 ${s.phone}</td>
                <td class="px-8 py-6 text-xs mono text-slate-400 capitalize">${s.created_at || 'Syncing...'}</td>
              `;
              list.appendChild(row);
            });
          } else {
            list.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-slate-500 font-medium leading-relaxed bg-slate-50/50"><div class="font-black text-slate-900 text-lg mb-2">No Students Found</div>The student database is currently empty. This might mean no students have registered yet, or if you are previewing locally without D1, the simulation data may not contain any test users.</td></tr>';
          }
        } catch (e) {
          list.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-red-500 font-medium leading-relaxed bg-red-50"><div class="font-black text-red-900 text-lg mb-2">Data Fetch Failed</div>Could not connect to the database or retrieve student data. Please check your network connection or backend configuration.</td></tr>';
          console.error(e);
        }
      }

      async function fetchFeedback() {
        const view = document.getElementById('feedbackView');
        view.innerHTML = '';
        try {
          const res = await fetch('/api/admin/feedback');
          const data = await res.json();
          if (data.feedback && data.feedback.length > 0) {
            data.feedback.forEach(f => {
              const card = document.createElement('div');
              card.className = 'bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-4';
              card.innerHTML = `
                <div class="flex justify-between items-start">
                  <div>
                    <h4 class="font-black text-lg text-slate-900">${f.student_name}</h4>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">To: ${f.teacher_subject}</span>
                  </div>
                  <span class="text-[10px] mono text-slate-400 uppercase tracking-tighter">${f.created_at || 'Just Now'}</span>
                </div>
                <p class="text-slate-600 font-medium leading-relaxed italic border-l-4 border-slate-100 pl-6">"${f.comment}"</p>
              `;
              view.appendChild(card);
            });
          } else {
            view.innerHTML = '<div class="bg-white p-20 rounded-[2.5rem] text-center font-bold text-slate-400">No Feedback Received Yet.</div>';
          }
        } catch (e) { console.error(e); }
      }

      // Admin Auth Logic
      const adminLoginForm = document.getElementById('adminLoginForm');
      const adminLoginOverlay = document.getElementById('adminLoginOverlay');
      const adminLoginError = document.getElementById('adminLoginError');
      const adminLoginBtn = document.getElementById('adminLoginBtn');

      if (sessionStorage.getItem('adminAuth')) {
        adminLoginOverlay.classList.add('hidden');
        refreshData();
      }

      adminLoginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        adminLoginBtn.textContent = 'Verifying...';
        adminLoginBtn.disabled = true;
        adminLoginError.classList.add('hidden');

        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (data.success) {
            sessionStorage.setItem('adminAuth', 'true');
            adminLoginOverlay.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => adminLoginOverlay.classList.add('hidden'), 300);
            refreshData();
          } else {
            adminLoginError.textContent = data.message || 'Invalid credentials.';
            adminLoginError.classList.remove('hidden');
          }
        } catch (err) {
          adminLoginError.textContent = 'Server connection error.';
          adminLoginError.classList.remove('hidden');
        } finally {
          adminLoginBtn.textContent = 'Sign In to Dashboard';
          adminLoginBtn.disabled = false;
        }
      });

      // Question Form Logic
      const form = document.getElementById('questionForm');
      const submitBtn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');

      if(form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          submitBtn.disabled = true;
          submitBtn.textContent = 'Publishing...';
          successMsg.classList.add('hidden');

          const optA = document.getElementById('optA').value;
          const optB = document.getElementById('optB').value;
          const optC = document.getElementById('optC').value;
          const optD = document.getElementById('optD').value;
          const correctKey = document.getElementById('correctAnswer').value;
          
          let answerText = '';
          if(correctKey === 'A') answerText = optA;
          if(correctKey === 'B') answerText = optB;
          if(correctKey === 'C') answerText = optC;
          if(correctKey === 'D') answerText = optD;

          const payload = {
            subject: document.getElementById('subject').value,
            question: document.getElementById('question').value,
            options: JSON.stringify([optA, optB, optC, optD]),
            answer: answerText
          };

          try {
            const response = await fetch('/api/questions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            const res = await response.json();
            if (res.success) {
              successMsg.classList.remove('hidden');
              form.reset();
            } else {
              alert('Error: ' + res.error);
            }
          } catch (err) {
            alert('Sync Failed: Check your Cloudflare binding.');
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Publish to Database';
          }
        });
      }
    </script>
  </body>
</html>
