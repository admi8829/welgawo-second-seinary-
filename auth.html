<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #050505;
        color: white;
      }
      .font-display { font-family: 'Outfit', sans-serif; }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .auth-gradient {
        background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                    radial-gradient(circle at bottom left, rgba(234, 88, 12, 0.1), transparent 40%);
      }
      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }
      .input-field:focus {
        border-color: #3b82f6;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      }
    </style>
  </head>
  <body class="auth-gradient min-h-screen flex items-center justify-center p-6">
    
    <div class="w-full max-w-md space-y-8 relative z-10">
      <div class="text-center">
        <a href="/" class="inline-flex items-center gap-3 mb-8 group">
          <div class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center font-display font-black text-2xl shadow-[0_0_30px_rgba(255,255,255,0.2)] group-hover:scale-110 transition-transform">X</div>
          <span class="font-display font-extrabold text-2xl tracking-tight">SMART<span class="text-blue-500">X</span></span>
        </a>
        <h1 id="authTitle" class="text-4xl font-display font-black tracking-tight mb-2">Welcome Back</h1>
        <p id="authSubtitle" class="text-zinc-400 font-medium">Continue your journey to excellence.</p>
      </div>

      <div class="glass p-8 rounded-[2.5rem] shadow-2xl space-y-6">
        <!-- Google Button -->
        <button id="googleBtn" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-zinc-200 transition-all active:scale-[0.98]">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="flex items-center gap-4 py-2">
          <div class="h-px bg-white/10 flex-1"></div>
          <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">or email</span>
          <div class="h-px bg-white/10 flex-1"></div>
        </div>

        <form id="authForm" class="space-y-4">
          <div id="nameGroup" class="space-y-2 hidden">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-1">Full Name</label>
            <input type="text" id="emailName" class="w-full input-field rounded-2xl p-4 outline-none text-white transition-all" placeholder="E.g. Abebe Bikila">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-1">Email Address</label>
            <input type="email" id="emailInput" required class="w-full input-field rounded-2xl p-4 outline-none text-white transition-all" placeholder="your@email.com">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-1">Password</label>
            <input type="password" id="passwordInput" required class="w-full input-field rounded-2xl p-4 outline-none text-white transition-all" placeholder="••••••••">
          </div>
          <div id="gradeGroup" class="space-y-2 hidden">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-1">Grade Level</label>
            <select id="gradeInput" class="w-full input-field rounded-2xl p-4 outline-none text-white transition-all appearance-none">
              <option value="9">Grade 9</option>
              <option value="10">Grade 10</option>
              <option value="11">Grade 11</option>
              <option value="12">Grade 12</option>
            </select>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-[0_0_30px_rgba(37,99,235,0.3)] hover:bg-blue-500 transition-all active:scale-[0.98] mt-4">
            Sign In
          </button>
        </form>

        <p class="text-center text-sm text-zinc-500">
          <span id="toggleText">Don't have an account?</span>
          <button id="toggleMode" class="text-white font-bold hover:text-blue-400 transition-colors ml-1">Create Account</button>
        </p>
      </div>

      <p class="text-center text-[10px] text-zinc-600 uppercase font-bold tracking-widest">
        By continuing, you agree to our <a href="/terms.html" class="hover:text-zinc-400 underline">Terms</a> & <a href="/privacy.html" class="hover:text-zinc-400 underline">Privacy</a>
      </p>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-50">
       <div class="absolute top-1/4 -right-20 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>
       <div class="absolute bottom-1/4 -left-20 w-80 h-80 bg-orange-600/10 rounded-full blur-[100px]"></div>
    </div>

    <script type="module" src="/src/auth.ts"></script>
  </body>
</html>
