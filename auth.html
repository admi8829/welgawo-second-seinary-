<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #050505;
        color: white;
      }
      .font-display { font-family: 'Outfit', sans-serif; }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .auth-gradient {
        background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                    radial-gradient(circle at bottom left, rgba(234, 88, 12, 0.1), transparent 40%);
      }
      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }
      .input-field:focus {
        border-color: #3b82f6;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      }
    </style>
  </head>
  <body class="auth-gradient min-h-screen flex items-center justify-center p-4 sm:p-8">
    
    <div class="w-full max-w-lg space-y-10 relative z-10 animate-fade-in">
      <div class="text-center space-y-4">
        <a href="/" class="inline-flex items-center gap-4 mb-4 group">
          <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-[1.25rem] flex items-center justify-center font-display font-black text-3xl shadow-[0_0_40px_rgba(37,99,235,0.4)] group-hover:scale-105 transition-all duration-500">X</div>
          <span class="font-display font-black text-3xl tracking-tight text-white">SMART<span class="text-blue-500">X</span></span>
        </a>
        <h1 id="authTitle" class="text-5xl font-display font-black tracking-tight text-white leading-tight">Welcome Back</h1>
        <p id="authSubtitle" class="text-zinc-400 font-medium text-lg max-w-sm mx-auto">Elevate your education with Ethiopia's most intelligent learning platform.</p>
      </div>

      <div class="glass p-8 sm:p-12 rounded-[3rem] shadow-2xl border border-white/10 relative overflow-hidden group/card">
        <!-- Subtle internal glow -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 rounded-full blur-[80px] pointer-events-none"></div>

        <!-- Google Button -->
        <button id="googleBtn" class="w-full bg-white text-black font-extrabold py-5 rounded-[1.5rem] flex items-center justify-center gap-4 hover:bg-zinc-100 transition-all active:scale-[0.98] shadow-lg shadow-white/5 group">
          <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="flex items-center gap-6 py-6">
          <div class="h-px bg-white/5 flex-1"></div>
          <span class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.2em]">or secure email</span>
          <div class="h-px bg-white/5 flex-1"></div>
        </div>

        <form id="authForm" class="space-y-5">
          <div id="nameGroup" class="space-y-2 hidden animate-in slide-in-from-top-4 duration-500">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-2">Full Name</label>
            <input type="text" id="emailName" class="w-full input-field rounded-[1.25rem] p-5 outline-none text-white transition-all text-lg" placeholder="Student Name">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-2">Email Identity</label>
            <input type="email" id="emailInput" required class="w-full input-field rounded-[1.25rem] p-5 outline-none text-white transition-all text-lg" placeholder="name@domain.com">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-2">Secret Password</label>
            <input type="password" id="passwordInput" required class="w-full input-field rounded-[1.25rem] p-5 outline-none text-white transition-all text-lg" placeholder="••••••••">
          </div>
          <div id="gradeGroup" class="space-y-2 hidden animate-in slide-in-from-top-4 duration-500">
            <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest px-2">Academic Level</label>
            <div class="relative">
              <select id="gradeInput" class="w-full input-field rounded-[1.25rem] p-5 outline-none text-white transition-all appearance-none text-lg cursor-pointer">
                <option value="9">Grade 9 (Selection)</option>
                <option value="10">Grade 10 (Selection)</option>
                <option value="11">Grade 11 (Selection)</option>
                <option value="12">Grade 12 (Selection)</option>
              </select>
              <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-[0_10px_40px_rgba(37,99,235,0.4)] hover:bg-blue-500 hover:scale-[1.02] transition-all active:scale-[0.98] mt-6 text-lg">
            Sign In
          </button>
        </form>

        <p class="text-center pt-8">
          <span id="toggleText" class="text-zinc-500 font-medium">Don't have an account?</span>
          <button id="toggleMode" class="text-white font-bold hover:text-blue-400 transition-colors ml-2 underline underline-offset-4 decoration-blue-500/50">Create Account</button>
        </p>
      </div>

      <div class="flex items-center justify-center gap-8 text-[11px] text-zinc-600 uppercase font-black tracking-[0.2em]">
        <a href="/terms" class="hover:text-zinc-400 transition-colors">Terms of Service</a>
        <span class="w-1 h-1 bg-zinc-800 rounded-full"></span>
        <a href="/privacy" class="hover:text-zinc-400 transition-colors">Privacy Policy</a>
      </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-50">
       <div class="absolute top-1/4 -right-20 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>
       <div class="absolute bottom-1/4 -left-20 w-80 h-80 bg-orange-600/10 rounded-full blur-[100px]"></div>
    </div>

    <script type="module" src="/src/auth.ts"></script>
  </body>
</html>
