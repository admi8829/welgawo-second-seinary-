<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Resources | Smart-X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f8fafc] text-slate-800">
    <div class="max-w-4xl mx-auto px-6 py-20 space-y-16">
      <header class="text-center space-y-4">
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] hover:text-blue-600 transition-colors">Return to Home</a>
        <h1 class="text-6xl font-display font-black text-slate-900 leading-none">Resource <span class="text-blue-600 italic">Hub</span></h1>
        <p class="text-slate-500 font-medium leading-relaxed italic">Essential reading materials and textbooks for your academic journey.</p>
      </header>

      <div class="grid md:grid-cols-2 gap-8">
         <div class="bg-white p-12 rounded-[3.5rem] shadow-xl border border-slate-100 space-y-6">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl italic">G12</div>
            <h3 class="text-3xl font-display font-black text-slate-900 italic uppercase">Grade 12 Physics</h3>
            <p class="text-slate-500 font-medium">Comprehensive textbook covering mechanics, electricity, and quantum theory.</p>
            <button class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-blue-600 transition-all text-xs uppercase tracking-widest">Download PDF</button>
         </div>

         <div class="bg-white p-12 rounded-[3.5rem] shadow-xl border border-slate-100 space-y-6">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-black text-2xl italic">G11</div>
            <h3 class="text-3xl font-display font-black text-slate-900 italic uppercase">Grade 11 Mathematics</h3>
            <p class="text-slate-500 font-medium">Advanced equations, calculus precursors, and statistical frameworks.</p>
            <button class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-blue-600 transition-all text-xs uppercase tracking-widest">Download PDF</button>
         </div>
      </div>
    </div>
  </body>
</html>
