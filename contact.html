<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Hub | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-white text-slate-900">
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 px-6 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">X</div>
          <div class="flex flex-col">
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Smart X</span>
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Academy</span>
          </div>
        </a>
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600">Mainframe Exit</a>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-24 pb-48 space-y-32">
      <header class="text-center space-y-10 max-w-4xl mx-auto">
        <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.5em]">Communication Portal</p>
        <h1 class="text-7xl md:text-9xl font-display font-black text-slate-900 leading-[0.8] tracking-tighter italic uppercase">
          Signal <br/> <span class="text-blue-600">Hub.</span>
        </h1>
        <p class="text-2xl text-slate-500 font-medium leading-relaxed italic capitalize">Transmit clinical observations, architectural feedback, or support requests directly to our core node architects.</p>
      </header>

      <div class="max-w-3xl mx-auto bg-slate-900 rounded-[4rem] p-16 md:p-24 shadow-3xl text-white relative overflow-hidden">
         <form class="relative z-10 space-y-12">
            <div class="grid md:grid-cols-2 gap-8">
               <div class="space-y-4">
                  <label class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] italic">Scholar Identifier</label>
                  <input type="text" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 font-bold text-white placeholder:text-white/20 outline-none focus:border-blue-500 transition-all">
               </div>
               <div class="space-y-4">
                  <label class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] italic">Signal Frequency</label>
                  <input type="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 font-bold text-white placeholder:text-white/20 outline-none focus:border-blue-500 transition-all">
               </div>
            </div>
            <div class="space-y-4">
               <label class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] italic">Observation Data</label>
               <textarea rows="5" placeholder="How can our architects assist you?" class="w-full bg-white/5 border border-white/10 rounded-[2rem] px-8 py-6 font-bold text-white placeholder:text-white/20 outline-none focus:border-blue-500 transition-all"></textarea>
            </div>
            <button type="submit" class="w-full bg-white text-slate-900 font-black py-7 rounded-[2rem] hover:bg-blue-600 hover:text-white shadow-3xl transition-all uppercase tracking-[0.3em] text-[10px]">Broadcast Signal</button>
         </form>
         <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-blue-600/10 rounded-full blur-[100px]"></div>
      </div>

       <div class="text-center space-y-4">
         <p class="text-slate-400 font-black text-[10px] uppercase tracking-[0.5em] italic">Node Contact Protocol</p>
         <p class="text-2xl font-display font-black text-slate-900 italic uppercase">support@smartx.academy</p>
         <p class="text-slate-300 text-[9px] font-bold uppercase tracking-widest italic">Addis Ababa Mainframe 01 • Sector 7G</p>
      </div>
    </main>

  </body>
</html>
