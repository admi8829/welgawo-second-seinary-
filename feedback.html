<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet Our Faculty | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-100 px-6 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl italic">X</div>
          <span class="font-black text-xl tracking-tight text-slate-900 border-b-4 border-blue-600/20">FACULTY HUB</span>
        </a>
        <a href="/" class="text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors uppercase tracking-widest">Back to Home</a>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20 space-y-20">
      <div class="text-center space-y-4 max-w-2xl mx-auto">
        <h1 class="text-5xl font-black text-slate-900 tracking-tight">The Best Teachers, <span class="text-blue-600 italic">Pre-verified</span>.</h1>
        <p class="text-xl text-slate-500 font-medium">Smart X strictly selects only the top 1% of Ethiopian educators. Help us maintain quality by sharing your feedback below.</p>
      </div>

      <!-- Teachers Grid -->
      <div id="teachersGrid" class="grid lg:grid-cols-1 gap-12">
        <!-- JS Injected Teachers -->
        <div class="py-20 text-center col-span-full">
           <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
           <p class="mt-4 text-slate-400 font-bold uppercase text-xs tracking-widest">Identifying Educators...</p>
        </div>
      </div>
    </main>

    <!-- Comment Modal (Hidden Overlay) -->
    <div id="commentModal" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-6">
      <div class="bg-white w-full max-w-lg rounded-[3rem] shadow-3xl overflow-hidden animate-in zoom-in-95 duration-300">
        <div class="p-10 space-y-8">
          <div class="flex justify-between items-center">
            <h3 id="modalTeacherName" class="text-2xl font-black text-slate-900">Add Feedback</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 font-bold">Close</button>
          </div>
          
          <form id="commentForm" class="space-y-6">
            <input type="hidden" id="teacherIdInput">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Your Name</label>
              <input type="text" id="studentName" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" placeholder="Abebe Bikila">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Your Experience</label>
              <textarea id="commentText" rows="4" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" placeholder="How was the lecture?"></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 hover:bg-slate-900 transition-all active:scale-95">Post Feedback</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      async function loadTeachers() {
        const grid = document.getElementById('teachersGrid');
        try {
          const res = await fetch('/api/teachers');
          const data = await res.json();
          if (data.success) {
            grid.innerHTML = '';
            for (const t of data.teachers) {
              const teacherCard = await createTeacherCard(t);
              grid.appendChild(teacherCard);
            }
          }
        } catch (e) { console.error(e); }
      }

      async function createTeacherCard(t) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden flex flex-col md:flex-row';
        
        // Inner HTML Template
        card.innerHTML = `
          <div class="md:w-1/3 bg-slate-100 relative h-80 md:h-auto overflow-hidden flex items-center justify-center">
            ${t.photo ? `<img src="${t.photo}" class="w-full h-full object-cover opacity-80" alt="${t.name}">` : 
            `<svg class="w-32 h-32 text-slate-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`}
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
            <div class="absolute bottom-10 left-10 text-white space-y-1 z-10">
              <h3 class="text-3xl font-black tracking-tight leading-none">${t.name}</h3>
              <p class="text-blue-400 font-bold uppercase text-xs tracking-widest">${t.subject} Expert</p>
            </div>
          </div>
          <div class="md:w-2/3 p-10 md:p-12 space-y-10">
            <div class="flex justify-between items-start gap-4">
              <p class="text-slate-500 font-medium text-lg leading-relaxed max-w-xl">
                "${t.bio}"
              </p>
              <div class="flex items-center gap-3">
                <button onclick="likeTeacher(${t.id}, this)" class="group flex items-center gap-2 bg-slate-50 px-5 py-3 rounded-2xl hover:bg-blue-50 transition-all border border-slate-100">
                  <svg class="w-5 h-5 text-slate-400 group-hover:text-blue-600 transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path></svg>
                  <span class="font-black text-slate-900 text-sm">${t.likes || 0}</span>
                </button>
                <button onclick="unlikeTeacher(${t.id}, this)" class="group flex items-center gap-2 bg-slate-50 px-5 py-3 rounded-2xl hover:bg-red-50 transition-all border border-slate-100">
                  <svg class="w-5 h-5 text-slate-400 group-hover:text-red-500 transition-colors" fill="currentColor" viewBox="0 0 20 20"><path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.4-1.866a4 4 0 00.8-2.4z"></path></svg>
                  <span class="font-black text-slate-900 text-sm">${t.unlikes || 0}</span>
                </button>
              </div>
            </div>

            <div class="space-y-6 pt-6 border-t border-slate-50">
              <div class="flex items-center justify-between">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Public Comments</h4>
                <button onclick="openModal(${t.id}, '${t.name}')" class="text-xs font-black text-blue-600 hover:underline">Add Your Review</button>
              </div>
              <div id="comments-${t.id}" class="space-y-4 max-h-60 overflow-y-auto pr-4 custom-scrollbar">
                <p class="text-slate-300 text-sm font-bold uppercase tracking-widest text-center py-4">Loading conversation...</p>
              </div>
            </div>
          </div>
        `;
        
        loadComments(t.id);
        return card;
      }

      async function loadComments(teacherId) {
        const container = document.getElementById(`comments-${teacherId}`);
        try {
          const res = await fetch(`/api/teachers/${teacherId}/comments`);
          const data = await res.json();
          if (data.comments && data.comments.length > 0) {
            container.innerHTML = data.comments.map(c => `
              <div class="bg-slate-50 p-6 rounded-2xl space-y-2">
                <div class="flex justify-between">
                  <span class="font-bold text-slate-900 text-sm">${c.student_name}</span>
                  <span class="text-[10px] text-slate-400 uppercase tracking-tighter">${new Date(c.created_at).toLocaleDateString()}</span>
                </div>
                <p class="text-slate-600 text-sm font-medium leading-relaxed italic">"${c.comment}"</p>
              </div>
            `).join('');
          } else {
            container.innerHTML = `<p class="text-slate-300 text-sm italic py-4 text-center">No reviews yet. Be the first to share your experience!</p>`;
          }
        } catch (e) { container.innerHTML = ''; }
      }

      async function likeTeacher(id, btn) {
        if(btn.disabled) return;
        try {
          await fetch(`/api/teachers/${id}/like`, { method: 'POST' });
          const span = btn.querySelector('span');
          span.textContent = parseInt(span.textContent) + 1;
          btn.classList.add('bg-blue-50', 'border-blue-200');
          btn.querySelector('svg').classList.add('text-blue-600');
          btn.disabled = true;
        } catch (e) {}
      }

      async function unlikeTeacher(id, btn) {
        if(btn.disabled) return;
        try {
          await fetch(`/api/teachers/${id}/unlike`, { method: 'POST' });
          const span = btn.querySelector('span');
          span.textContent = parseInt(span.textContent) + 1;
          btn.classList.add('bg-red-50', 'border-red-200');
          btn.querySelector('svg').classList.add('text-red-500');
          btn.disabled = true;
          // optional: disable like too
        } catch (e) {}
      }

      function openModal(id, name) {
        document.getElementById('teacherIdInput').value = id;
        document.getElementById('modalTeacherName').textContent = 'Review ' + name;
        document.getElementById('commentModal').classList.remove('hidden');
      }

      function closeModal() {
        document.getElementById('commentModal').classList.add('hidden');
      }

      document.getElementById('commentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('teacherIdInput').value;
        const payload = {
          student_name: document.getElementById('studentName').value,
          comment: document.getElementById('commentText').value
        };

        try {
          const res = await fetch(`/api/teachers/${id}/comments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            closeModal();
            loadComments(id);
            document.getElementById('studentName').value = '';
            document.getElementById('commentText').value = '';
          }
        } catch (e) {}
      });

      window.onload = loadTeachers;
    </script>
    <style>
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
  </body>
</html>
