<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholar Feedback | Smart-X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f8fafc] text-slate-800">
    <div class="max-w-4xl mx-auto px-6 py-20 space-y-16">
      <header class="text-center space-y-4">
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] hover:text-blue-600 transition-colors">Abort & Return</a>
        <h1 class="text-6xl font-display font-black text-slate-900 leading-none">Scholar <span class="text-blue-600 italic">Signal</span></h1>
        <p class="text-slate-500 font-medium leading-relaxed italic">Your observations directly influence the evolution of our academic engine.</p>
      </header>

      <div class="max-w-2xl mx-auto bg-white p-16 rounded-[4rem] shadow-2xl border border-slate-100 space-y-10">
         <div class="space-y-4">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Scholar Name</label>
            <input type="text" placeholder="Your Name" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-900 placeholder:text-slate-300 outline-none focus:border-blue-600 transition-all">
         </div>
         <div class="space-y-4">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Observation Details</label>
            <textarea rows="4" placeholder="How can we improve Smart-X?" class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 font-bold text-slate-900 placeholder:text-slate-300 outline-none focus:border-blue-600 transition-all"></textarea>
         </div>
         <button class="w-full bg-blue-600 text-white font-bold py-6 rounded-3xl hover:bg-slate-900 transition-all uppercase tracking-[0.3em] text-xs shadow-xl shadow-blue-100">Broadcast Signal</button>
      </div>
    </div>
  </body>
</html>
