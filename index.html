<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudflare Pages + Functions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      .mono {
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-sm border border-slate-200 p-8 space-y-8">
      <div class="space-y-2 text-center">
        <div class="inline-flex items-center justify-center p-3 bg-orange-50 rounded-2xl mb-2">
          <svg class="w-8 h-8 text-orange-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
        </div>
        <h1 class="text-2xl font-semibold text-slate-900 leading-tight">Cloudflare Pages</h1>
        <p class="text-slate-500 text-sm">Testing Functions with a simple fetch call.</p>
      </div>

      <div class="space-y-4">
        <button 
          id="fetchButton"
          class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-6 rounded-2xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2"
        >
          <span>Call Backend API</span>
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>

        <div id="displayArea" class="hidden animate-in fade-in slide-in-from-top-4 duration-500">
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider mb-2 mono">Response</p>
            <div id="messageDisplay" class="text-slate-700 font-medium"></div>
          </div>
        </div>
      </div>

      <div class="pt-6 border-top border-slate-100 italic text-center">
        <p class="text-xs text-slate-400">Folder Structure: <span class="mono">/functions/hello.js</span></p>
      </div>
    </div>

    <script>
      const button = document.getElementById('fetchButton');
      const displayArea = document.getElementById('displayArea');
      const messageDisplay = document.getElementById('messageDisplay');

      button.addEventListener('click', async () => {
        // Disable button and show loading logic (optional but good UX)
        const originalText = button.innerHTML;
        button.disabled = true;
        button.innerHTML = '<span class="animate-pulse">Fetching...</span>';

        try {
          // fetch() call to the Cloudflare function endpoint
          // In Cloudflare Pages, /functions/hello.js is served at /hello
          const response = await fetch('/hello');
          const data = await response.json();
          
          // Display the message
          messageDisplay.textContent = data.message;
          displayArea.classList.remove('hidden');
        } catch (error) {
          console.error('Error fetching data:', error);
          messageDisplay.textContent = 'Error: Could not connect to backend.';
          displayArea.classList.remove('hidden');
        } finally {
          button.disabled = false;
          button.innerHTML = originalText;
        }
      });
    </script>
  </body>
</html>
