<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Smart X Academy | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6">
    
    <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
      <div class="h-2 bg-blue-600"></div>
      <div class="p-10 space-y-10">
        <div class="text-center space-y-2">
          <div class="inline-flex items-center gap-2 mb-4">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold italic">X</div>
            <span class="font-bold text-xl tracking-tight">SMART X ACADEMY</span>
          </div>
          <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">የተማሪዎች ምዝገባ</h2>
          <p class="text-slate-500">ለመጀመር አስፈላጊ መረጃዎችን ከታች ይሙሉ።</p>
        </div>

        <form id="registrationForm" class="space-y-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Full Name (ሙሉ ስም)</label>
            <input type="text" id="regName" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Enter your full name">
          </div>
          
          <div class="grid sm:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Email Address</label>
              <input type="email" id="regEmail" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="your@email.com">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Grade (ክፍል)</label>
              <select id="regGrade" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                <option value="9">Grade 9</option>
                <option value="10">Grade 10</option>
                <option value="11">Grade 11</option>
                <option value="12">Grade 12</option>
              </select>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Phone Number (ስልክ ቁጥር)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 font-bold text-slate-400">+251</span>
              <input type="tel" id="regPhone" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-16 pr-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="912345678">
            </div>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-[0.98] transition-all">አሁን ይመዝገቡ (Join Now)</button>
          
          <a href="/" class="block text-center text-slate-500 text-sm font-medium hover:text-slate-900 transition-colors">ወደ ዋናው ገጽ ተመለስ</a>
        </form>

        <!-- Success Alert -->
        <div id="successCard" class="hidden text-center space-y-6 animate-in zoom-in-95 duration-500">
          <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
          </div>
          <div class="space-y-2">
            <h3 class="text-2xl font-bold text-slate-900">በተሳካ ሁኔታ ተመዝግበዋል!</h3>
            <p class="text-slate-500">አካዳሚያችንን ስለተቀላቀሉ እናመሰግናለን። በቅርቡ በስልክ ቁጥርዎ እናገኝዎታለን።</p>
          </div>
          <a href="/" class="inline-block bg-slate-900 text-white px-8 py-3 rounded-full font-bold">ወደ ዋናው ገጽ</a>
        </div>
      </div>
    </div>

    <script>
      const regForm = document.getElementById('registrationForm');
      const submitBtn = document.getElementById('submitBtn');
      const successCard = document.getElementById('successCard');

      regForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = 'በመመዝገብ ላይ...';

        const studentData = {
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          grade: document.getElementById('regGrade').value,
          phone: document.getElementById('regPhone').value
        };

        try {
          const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(studentData)
          });

          const result = await response.json();
          if (result.success) {
            regForm.classList.add('hidden');
            successCard.classList.remove('hidden');
          } else {
            alert('ስህተት ተፈጥሯል፦ ' + result.error);
          }
        } catch (err) {
          alert('ከሰርቨር ጋር መገናኘት አልተቻለም።');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'አሁን ይመዝገቡ (Join Now)';
        }
      });
    </script>
  </body>
</html>
