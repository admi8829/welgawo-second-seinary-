<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard | Smart-X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f0f9ff] min-h-screen text-slate-800 p-6 md:p-10">
    <div class="max-w-4xl mx-auto space-y-10">
      
      <!-- High-End Header -->
      <header class="flex flex-col md:flex-row items-center justify-between gap-6 bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
        <a href="/" class="flex flex-col">
           <span class="font-display font-black text-2xl tracking-tighter leading-none text-slate-900 uppercase italic">Smart-<span class="text-blue-600">X</span></span>
           <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Leaderboard</span>
        </a>
        <nav class="flex items-center gap-8 text-[11px] font-black text-slate-500 uppercase tracking-widest hidden md:flex">
          <a href="/quiz" class="hover:text-blue-600 transition-colors">Quiz</a>
          <a href="/books.html" class="hover:text-blue-600 transition-colors">Books</a>
        </nav>
      </header>
      
      <div class="text-center space-y-4">
        <div class="inline-block px-4 py-2 bg-yellow-100 text-yellow-700 rounded-full text-xs font-black uppercase tracking-widest mb-4">Top Minds of Smart-X</div>
        <h1 class="text-5xl font-display font-black tracking-tight uppercase italic text-slate-900">Hall of Fame</h1>
        <p class="text-slate-500 font-medium">The most brilliant students conquering the Ethiopian curriculum.</p>
      </div>

      <div class="bg-white rounded-[3rem] shadow-2xl shadow-blue-500/10 border border-slate-100 p-8 md:p-12">
         <div id="boardContainer" class="space-y-4">
            <!-- Ranks will be injected -->
         </div>
      </div>
      
    </div>
    
    <script>
       async function loadBoard() {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          const container = document.getElementById('boardContainer');
          
          if (data.success && data.leaderboard) {
             container.innerHTML = data.leaderboard.map((u, i) => {
                const rankColor = i === 0 ? 'bg-yellow-400 text-white' : i === 1 ? 'bg-slate-300 text-white' : i === 2 ? 'bg-amber-600 text-white' : 'bg-slate-100 text-slate-500';
                return \`
                <div class="flex items-center justify-between bg-slate-50 p-6 rounded-[2rem] hover:scale-[1.02] transition-all">
                   <div class="flex items-center gap-6">
                      <div class="w-12 h-12 flex items-center justify-center rounded-2xl \${rankColor} font-black text-xl font-display">
                         \${i + 1}
                      </div>
                      <div>
                         <h3 class="text-lg font-black text-slate-900">\${u.name || 'Anonymous Learner'}</h3>
                         <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Grade \${u.grade}</p>
                      </div>
                   </div>
                   <div class="text-right">
                      <div class="text-3xl font-display font-black text-slate-800 leading-none">\${u.totalScore}</div>
                      <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Mastery Points</div>
                   </div>
                </div>
                \`;
             }).join('');
             if(data.leaderboard.length === 0) {
                 container.innerHTML = '<p class="text-center text-slate-400">No data available yet.</p>';
             }
          }
       }
       loadBoard();
    </script>
  </body>
</html>
