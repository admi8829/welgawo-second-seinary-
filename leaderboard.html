<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Ledger | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-white text-slate-900">
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 px-6 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">X</div>
          <div class="flex flex-col">
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Smart X</span>
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Academy</span>
          </div>
        </a>
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600">Mainframe Exit</a>
      </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-20 pb-32 space-y-24">
      <header class="text-center space-y-8">
        <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.5em]">Hall of Elite</p>
        <h1 class="text-6xl md:text-8xl font-display font-black text-slate-900 leading-[0.9] tracking-tighter italic uppercase">
          Global <br/> <span class="text-blue-600">Ledger.</span>
        </h1>
        <p class="text-xl text-slate-500 font-medium leading-relaxed italic max-w-xl mx-auto">Honoring the top-performing scholars currently synchronized with the Smart X terminal network.</p>
      </header>

      <div class="bg-slate-900 rounded-[4rem] p-12 md:p-20 shadow-3xl text-white relative overflow-hidden">
         <div class="relative z-10 space-y-8" id="leaderboardList">
             <!-- Rankings will load here -->
             <div class="flex justify-center p-20">
                <div class="w-16 h-16 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
             </div>
         </div>
         <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-600/10 rounded-full blur-[100px]"></div>
      </div>

       <div class="text-center">
         <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em] italic">Updated Real-Time • Global Neural Core</p>
      </div>
    </main>

    <script>
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          if (data.success) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            
            data.leaderboard.forEach((entry, idx) => {
              const item = document.createElement('div');
              item.className = 'flex items-center justify-between p-8 bg-white/5 rounded-[2rem] border border-white/5 hover:bg-white/10 transition-all group';
              
              const rankColor = idx === 0 ? 'text-blue-500' : idx === 1 ? 'text-slate-400' : idx === 2 ? 'text-slate-500' : 'text-slate-700';
              
              item.innerHTML = `
                <div class="flex items-center gap-10">
                  <span class="text-5xl font-display font-black ${rankColor} opacity-50 group-hover:opacity-100 transition-opacity italic">#${(idx + 1).toString().padStart(2, '0')}</span>
                  <div>
                    <h3 class="text-2xl font-display font-black text-white italic uppercase">${entry.name}</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Scholar ID Node [${entry.id || 'N/A'}]</p>
                  </div>
                </div>
                <div class="text-right space-y-1">
                  <p class="text-4xl font-display font-black text-blue-500 italic">${entry.total_score}</p>
                  <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Performance Units</p>
                </div>
              `;
              list.appendChild(item);
            });

            if(data.leaderboard.length === 0) {
               list.innerHTML = `
                <div class="text-center py-20 space-y-6">
                  <p class="text-2xl font-display font-black text-slate-500 italic uppercase">No Data Tracks Detected.</p>
                  <a href="/quiz" class="inline-block bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Initiate Session</a>
                </div>
               `;
            }
          }
        } catch (e) { console.error('Ledger Fail:', e); }
      }
      loadLeaderboard();
    </script>
  </body>
</html>
