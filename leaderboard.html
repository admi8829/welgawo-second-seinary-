<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Ledger | Smart-X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f8fafc] text-slate-800">

    <div class="max-w-4xl mx-auto px-6 py-20 space-y-16">
      <header class="text-center space-y-4">
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] hover:text-blue-600 transition-colors">Return to Mainframe</a>
        <h1 class="text-6xl font-display font-black text-slate-900 leading-none">Global <span class="text-blue-600 italic">Ledger</span></h1>
        <p class="text-slate-500 font-medium italic">Honoring the top-performing scholars within the Smart-X network.</p>
      </header>

      <div class="bg-white rounded-[3rem] p-12 shadow-2xl border border-slate-100 overflow-hidden relative">
         <div class="space-y-6 relative z-10" id="leaderboardList">
             <!-- Rankings will load here -->
             <div class="flex justify-center p-20">
                <div class="w-12 h-12 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
             </div>
         </div>
         <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-50 rounded-full"></div>
      </div>

       <div class="text-center">
         <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Updated real-time • Smart-X Neural Core</p>
      </div>
    </div>

    <script>
      async function loadLeaderboard() {
        try {
          const res = await fetch('/api/leaderboard');
          const data = await res.json();
          if (data.success) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            
            data.leaderboard.forEach((entry, idx) => {
              const item = document.createElement('div');
              item.className = 'flex items-center justify-between p-6 bg-slate-50/50 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100 group';
              
              const rankColor = idx === 0 ? 'text-yellow-500' : idx === 1 ? 'text-slate-400' : idx === 2 ? 'text-amber-600' : 'text-slate-300';
              
              item.innerHTML = `
                <div class="flex items-center gap-6">
                  <span class="text-3xl font-display font-black ${rankColor} opacity-50 group-hover:opacity-100 transition-opacity">#${idx + 1}</span>
                  <div>
                    <h3 class="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors">${entry.name}</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Verified Scholar</p>
                  </div>
                </div>
                <div class="text-right">
                  <p class="text-2xl font-display font-black text-slate-900">${entry.total_score}</p>
                  <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Score Multiplier</p>
                </div>
              `;
              list.appendChild(item);
            });

            if(data.leaderboard.length === 0) {
               list.innerHTML = '<p class="text-center text-slate-400 font-bold p-10">No records found. Take the quiz to be the first!</p>';
            }
          }
        } catch (e) { console.error('Ledger Fail:', e); }
      }
      loadLeaderboard();
    </script>
  </body>
</html>
