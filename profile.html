<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholar Profile | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-white text-slate-900">
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 px-6 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">X</div>
          <div class="flex flex-col">
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Smart X</span>
            <span class="font-display font-black text-lg leading-none tracking-tight text-slate-900 uppercase">Academy</span>
          </div>
        </a>
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600">Mainframe Exit</a>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-24 pb-48 space-y-32">
      <header class="text-center space-y-10 max-w-4xl mx-auto">
        <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.5em]">Scholar Dossier</p>
        <h1 class="text-7xl md:text-9xl font-display font-black text-slate-900 leading-[0.8] tracking-tighter italic uppercase">
          Neural <br/> <span class="text-blue-600">Ident.</span>
        </h1>
        <p class="text-2xl text-slate-500 font-medium leading-relaxed italic capitalize">Verified performance data synthesized for the current academic session.</p>
      </header>

      <div class="max-w-4xl mx-auto bg-slate-900 rounded-[4rem] p-16 md:p-24 shadow-3xl text-white relative overflow-hidden grid md:grid-cols-2 gap-16">
         <div class="relative z-10 space-y-12">
            <div class="w-48 h-48 bg-white/5 rounded-[3rem] flex items-center justify-center border-4 border-white/10 shadow-3xl">
               <svg class="w-24 h-24 text-white/10" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
            <div class="space-y-4">
               <h3 class="text-5xl font-display font-black text-white italic uppercase">Guest Scholar</h3>
               <p class="text-xs font-black text-slate-500 uppercase tracking-widest italic">Temporary Node Connection Established</p>
            </div>
         </div>

         <div class="relative z-10 grid grid-cols-2 gap-8">
            <div class="bg-white/5 p-10 rounded-[2.5rem] border border-white/5 space-y-4">
               <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Global Rank</p>
               <p class="text-5xl font-display font-black text-blue-500 italic">N/A</p>
            </div>
            <div class="bg-white/5 p-10 rounded-[2.5rem] border border-white/5 space-y-4">
               <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Neural Links</p>
               <p class="text-5xl font-display font-black text-blue-500 italic">00</p>
            </div>
            <div class="col-span-2 bg-blue-600 p-10 rounded-[2.5rem] space-y-4">
               <p class="text-[10px] font-black text-white/50 uppercase tracking-widest italic">Avg Mastery</p>
               <p class="text-5xl font-display font-black text-white italic">0.00%</p>
            </div>
         </div>
         <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-blue-600/10 rounded-full blur-[100px]"></div>
      </div>
    </main>

  </body>
</html>
