<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | Smart X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
      .font-display { font-family: 'Outfit', sans-serif; }
      .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
  </head>
  <body class="min-h-screen p-6 sm:p-12">
    <div class="max-w-4xl mx-auto space-y-12">
      <nav class="flex items-center justify-between">
        <a href="/" class="flex items-center gap-3 group">
          <div class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center font-display font-black text-xl shadow-lg group-hover:scale-105 transition-all">X</div>
          <span class="font-display font-bold text-xl">SMART<span class="text-blue-500">X</span></span>
        </a>
        <button id="logoutBtn" class="text-zinc-400 hover:text-white font-medium transition-colors">Sign Out</button>
      </nav>

      <header class="space-y-6">
        <div class="flex flex-col sm:flex-row items-center gap-8">
          <div id="userAvatar" class="w-32 h-32 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[2.5rem] flex items-center justify-center font-display font-black text-5xl shadow-2xl">
            S
          </div>
          <div class="text-center sm:text-left space-y-2">
            <h1 id="userName" class="text-4xl sm:text-5xl font-display font-black tracking-tight">Student Name</h1>
            <p id="userEmail" class="text-zinc-400 font-medium italic">email@domain.com</p>
            <div id="userBadge" class="inline-flex items-center gap-2 px-3 py-1 bg-blue-600/20 text-blue-400 rounded-full text-[10px] font-bold tracking-widest uppercase">
               Grade <span id="userGrade">12</span> Scholar
            </div>
          </div>
        </div>
      </header>

      <div class="grid md:grid-cols-3 gap-6">
        <div class="glass p-8 rounded-[2.5rem] space-y-2">
          <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Quizzes Taken</p>
          <p class="text-4xl font-display font-black" id="quizCount">0</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem] space-y-2">
          <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Average Score</p>
          <p class="text-4xl font-display font-black" id="avgScore">0%</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem] space-y-2">
          <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Academy Rank</p>
          <p class="text-4xl font-display font-black">#--</p>
        </div>
      </div>

      <section class="glass p-8 sm:p-12 rounded-[3.5rem] space-y-8">
        <h2 class="text-2xl font-display font-black">Recent Activity</h2>
        <div id="activityLogs" class="space-y-4">
          <p class="text-zinc-500 italic">No recent activity found.</p>
        </div>
      </section>
    </div>

    <script type="module">
      import { auth, db, onAuthStateChanged, signOut } from './src/lib/firebase.ts';
      import { doc, getDoc, collection, query, getDocs, orderBy, limit } from 'firebase/firestore';

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = '/auth?mode=signin';
          return;
        }

        // Fill basic info
        document.getElementById('userName').textContent = user.displayName || 'Student';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = (user.displayName || 'S').charAt(0);

        try {
          // Get additional profile data
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (userDoc.exists()) {
            document.getElementById('userGrade').textContent = userDoc.data().grade || '12';
          }

          // Get quiz activity
          const q = query(
            collection(db, 'users', user.uid, 'quiz_results'),
            orderBy('completedAt', 'desc'),
            limit(10)
          );
          const querySnapshot = await getDocs(q);
          const activityLogs = document.getElementById('activityLogs');
          
          if (!querySnapshot.empty) {
            activityLogs.innerHTML = '';
            let totalScore = 0;
            let totalPossible = 0;

            querySnapshot.forEach((doc) => {
              const data = doc.data();
              totalScore += data.score;
              totalPossible += data.total;

              const item = document.createElement('div');
              item.className = 'flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5';
              item.innerHTML = `
                <div>
                  <p class="font-bold text-white">${data.subject || 'Daily Quiz'}</p>
                  <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">
                    ${data.completedAt?.toDate().toLocaleDateString() || 'Recently'}
                  </p>
                </div>
                <div class="text-right">
                  <p class="font-display font-black text-blue-500">${data.score}/${data.total}</p>
                </div>
              `;
              activityLogs.appendChild(item);
            });

            document.getElementById('quizCount').textContent = querySnapshot.size;
            const avg = totalPossible > 0 ? Math.round((totalScore / totalPossible) * 100) : 0;
            document.getElementById('avgScore').textContent = avg + '%';
          }
        } catch (e) {
          console.error("Error loading profile data:", e);
        }
      });

      document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        window.location.href = '/';
      };
    </script>
  </body>
</html>
