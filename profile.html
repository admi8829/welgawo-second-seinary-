<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholar Profile | Smart-X Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-display { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-[#f8fafc] text-slate-800">
    <div class="max-w-4xl mx-auto px-6 py-20 space-y-16">
      <header class="text-center space-y-4">
        <a href="/" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] hover:text-blue-600 transition-colors">Mainframe Dash</a>
        <h1 class="text-6xl font-display font-black text-slate-900 leading-none">Scholar <span class="text-blue-600 italic">Ident</span></h1>
        <p class="text-slate-500 font-medium leading-relaxed italic">Verified performance data for the academic year 2024/25.</p>
      </header>

      <div class="bg-white p-16 rounded-[4rem] shadow-2xl border border-slate-100 grid md:grid-cols-2 gap-12">
         <div class="space-y-8">
            <div class="w-32 h-32 bg-slate-100 rounded-[2.5rem] flex items-center justify-center border-4 border-white shadow-xl">
               <svg class="w-16 h-16 text-slate-300" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
            <div class="space-y-2">
               <h3 class="text-4xl font-display font-black text-slate-900 italic uppercase">Guest Scholar</h3>
               <p class="text-xs font-bold text-slate-400 uppercase tracking-widest italic">Temporary Node Connection</p>
            </div>
         </div>
         <div class="grid grid-cols-2 gap-6">
            <div class="bg-slate-50 p-8 rounded-3xl space-y-2">
               <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rank</p>
               <p class="text-3xl font-display font-black text-slate-900 italic">N/A</p>
            </div>
            <div class="bg-slate-50 p-8 rounded-3xl space-y-2">
               <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sessions</p>
               <p class="text-3xl font-display font-black text-slate-900 italic">00</p>
            </div>
         </div>
      </div>
    </div>
  </body>
</html>
